<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>카운트다운 타이머</title>
  <style>
    /* 페이지 전체를 가운데 정렬하는 기본 레이아웃 */
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      color: #37352f;
    }

    /* 노션 임베드에서도 깔끔하게 보이는 타이머 카드 */
    .timer-card {
      width: min(100%, 420px);
      padding: 32px 28px 28px;
      text-align: center;
      background: #ffffff;
      border: 1px solid #e9e9e7;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(15, 15, 15, 0.08);
    }

    h1 { margin: 0 0 22px; font-size: 1rem; font-weight: 650; letter-spacing: -0.01em; }

    /* 남은 시간을 크게 보여주는 영역 */
    #display {
      margin: 0 0 14px;
      font-size: clamp(4.25rem, 18vw, 6.5rem);
      font-weight: 750;
      line-height: 1;
      letter-spacing: -0.065em;
      font-variant-numeric: tabular-nums;
      color: #2f6fed;
      transition: color 0.25s, transform 0.25s;
    }

    /* 시간이 끝났을 때 적용되는 시각적 피드백 */
    .finished #display { color: #e53935; transform: scale(1.04); }
    /* 마지막 10초는 완료 전에도 숫자를 빨간색으로 강조합니다. */
    .urgent #display { color: #e53935; }

    #message { min-height: 22px; margin: 0 0 24px; color: #787774; font-size: 0.9rem; font-weight: 500; }
    .finished #message { color: #e53935; }

    .input-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      margin-bottom: 16px;
      padding: 12px;
      background: #f7f7f5;
      border: 1px solid #efefed;
      border-radius: 10px;
    }
    label { font-size: 0.9rem; font-weight: 550; color: #5f5f5b; }

    /* 분 단위 입력창 */
    input {
      width: 72px;
      padding: 8px 10px;
      border: 1px solid #dededb;
      border-radius: 7px;
      background: #ffffff;
      font: inherit;
      font-weight: 600;
      text-align: center;
      outline: none;
    }
    input:focus { border-color: #2f6fed; box-shadow: 0 0 0 3px rgba(47, 111, 237, 0.14); }

    .buttons { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    button {
      padding: 10px 12px;
      border: 1px solid #e3e3df;
      border-radius: 8px;
      background: #f7f7f5;
      color: #575752;
      font: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 1px 1px rgba(15, 15, 15, 0.03);
      transition: transform 0.15s, background 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    /* 초기화·일시정지·재개에 공통으로 쓰는 중립 Secondary 버튼 */
    button:hover:not(:disabled) {
      background: #f0f0ed;
      border-color: #d1d1cc;
      box-shadow: 0 2px 4px rgba(15, 15, 15, 0.06);
      transform: translateY(-1px);
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    /* 시작 버튼만 시선을 끄는 Notion풍 Primary 버튼으로 강조합니다. */
    #startBtn {
      border-color: #2383e2;
      background: #2383e2;
      color: #ffffff;
      box-shadow: 0 2px 5px rgba(35, 131, 226, 0.24);
    }
    #startBtn:hover:not(:disabled) {
      border-color: #1474c9;
      background: #1474c9;
      box-shadow: 0 3px 7px rgba(35, 131, 226, 0.30);
    }

    /* 좁은 노션 임베드에서도 카드의 여백과 글자 크기를 유지합니다. */
    @media (max-width: 360px) {
      body { padding: 12px; }
      .timer-card { padding: 26px 18px 20px; }
      .buttons { gap: 7px; }
      button { padding-inline: 8px; }
    }
  </style>
</head>
<body>
  <main class="timer-card" id="timerCard">
    <h1>카운트다운 타이머</h1>
    <div id="display" aria-live="polite">00:00</div>
    <p id="message">분을 입력하고 시작하세요.</p>

    <div class="input-row">
      <label for="minutes">시간</label>
      <input id="minutes" type="number" min="1" max="999" value="5" inputmode="numeric" />
      <span>분</span>
    </div>

    <div class="buttons">
      <button id="startBtn" type="button">시작</button>
      <button id="pauseBtn" type="button" disabled>일시정지</button>
      <button id="resumeBtn" type="button" disabled>계속하기</button>
      <button id="resetBtn" type="button">초기화</button>
    </div>
  </main>

  <script>
    // HTML 요소를 변수로 가져옵니다.
    const minutesInput = document.getElementById('minutes');
    const display = document.getElementById('display');
    const message = document.getElementById('message');
    const timerCard = document.getElementById('timerCard');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resumeBtn = document.getElementById('resumeBtn');
    const resetBtn = document.getElementById('resetBtn');

    // 타이머 상태를 저장할 변수입니다.
    let remainingSeconds = 0;
    let timerId = null;
    let isPaused = false;

    // 초 단위를 MM:SS 형식의 문자열로 바꿔 화면에 표시합니다.
    function renderTime(seconds) {
      const minutes = Math.floor(seconds / 60);
      const secs = seconds % 60;
      display.textContent = `${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }

    // 버튼과 입력창의 활성화 상태를 현재 타이머 상태에 맞춥니다.
    function updateControls(running) {
      startBtn.disabled = running || isPaused;
      pauseBtn.disabled = !running;
      resumeBtn.disabled = !isPaused;
      minutesInput.disabled = running || isPaused;
    }

    // 타이머를 1초마다 감소시키는 함수입니다.
    function tick() {
      remainingSeconds -= 1;
      renderTime(remainingSeconds);
      timerCard.classList.toggle('urgent', remainingSeconds > 0 && remainingSeconds <= 10);

      // 00:00에 도달하면 타이머를 종료하고 완료 상태를 표시합니다.
      if (remainingSeconds <= 0) {
        clearInterval(timerId);
        timerId = null;
        timerCard.classList.add('finished');
        message.textContent = '완료!';
        updateControls(false);
      }
    }

    // 시작: 입력한 분을 초로 변환해 카운트다운을 시작합니다.
    startBtn.addEventListener('click', () => {
      const inputMinutes = Number(minutesInput.value);
      if (!Number.isFinite(inputMinutes) || inputMinutes <= 0) {
        message.textContent = '1분 이상 입력해 주세요.';
        return;
      }

      remainingSeconds = Math.floor(inputMinutes * 60);
      timerCard.classList.remove('finished');
      timerCard.classList.toggle('urgent', remainingSeconds <= 10);
      message.textContent = '집중 중...';
      renderTime(remainingSeconds);
      timerId = setInterval(tick, 1000);
      updateControls(true);
    });

    // 일시정지: interval을 멈추되 남은 시간은 유지합니다.
    pauseBtn.addEventListener('click', () => {
      clearInterval(timerId);
      timerId = null;
      isPaused = true;
      message.textContent = '일시정지됨';
      updateControls(false);
    });

    // 재개: 저장된 남은 시간부터 다시 카운트다운합니다.
    resumeBtn.addEventListener('click', () => {
      isPaused = false;
      timerId = setInterval(tick, 1000);
      message.textContent = '집중 중...';
      updateControls(true);
    });

    // 초기화: 실행 중인 타이머를 멈추고 화면을 처음 상태로 되돌립니다.
    resetBtn.addEventListener('click', () => {
      clearInterval(timerId);
      timerId = null;
      isPaused = false;
      remainingSeconds = 0;
      renderTime(0);
      timerCard.classList.remove('finished');
      timerCard.classList.remove('urgent');
      message.textContent = '분을 입력하고 시작하세요.';
      updateControls(false);
    });
  </script>
</body>
</html>
